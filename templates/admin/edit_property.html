{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Edit Property</h2>
    <form method="POST">
        <div class="form-group">
            <label for="address">Address</label>
            <input type="text" class="form-control" id="address" name="address" value="{{ property.address }}" required>
        </div>
        <div class="form-group">
            <label for="total_units">Total Units</label>
            <input type="number" class="form-control" id="total_units" name="total_units" value="{{ property.total_units }}" required>
        </div>
        <button type="submit" class="btn btn-primary">Update Property</button>
    </form>
</div>
{% endblock %}
