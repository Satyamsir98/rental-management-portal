{% extends "admin_base.html" %}

{% block admin_content %}
<div class="container mt-4">
    <h2>Manage Properties</h2>

    <!-- Add Property Form -->
    <form method="POST" action="{{ url_for('manage_properties') }}">
        <div class="form-group">
            <label for="address">Property Address</label>
            <input type="text" class="form-control" id="address" name="address" required>
        </div>
        <div class="form-group">
            <label for="total_units">Total Units</label>
            <input type="number" class="form-control" id="total_units" name="total_units" required>
        </div>
        <button type="submit" class="btn btn-success">Add Property</button>
    </form>

    <hr>

    <h3>Existing Properties</h3>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Address</th>
                <th>Total Units</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for property in properties %}
                <tr>
                    <td>{{ property.address }}</td>
                    <td>{{ property.total_units }}</td>
                    <td>
                        <a href="{{ url_for('edit_property', property_id=property.id) }}" class="btn btn-warning">Edit</a>
                        <a href="{{ url_for('delete_property', property_id=property.id) }}" class="btn btn-danger">Delete</a>
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
